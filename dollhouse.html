<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Lab Tour (room view) · Henry Ford Pathology</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{ --hf:#0067a0; --ink:#13233d; --dim:#5a6b88; --line:rgba(14,34,66,.12); }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:var(--ink);background:#eef3fa;display:flex;flex-direction:column;overflow:hidden}
  header{display:flex;align-items:center;gap:12px;padding:9px 16px;background:#fff;border-bottom:1px solid var(--line);z-index:6}
  header img{height:30px}
  header .t b{display:block;font:600 13px system-ui;color:var(--hf)} header .t span{font-size:11px;color:var(--dim)}
  header .back{margin-left:auto;font:600 12px system-ui;color:var(--hf);text-decoration:none;border:1px solid var(--line);padding:7px 12px;border-radius:999px}
  /* rotating blueprint minimap */
  #mini-wrap{position:relative;height:190px;flex-shrink:0;background:linear-gradient(180deg,#0b1426,#0f1d36)}
  #mini{position:absolute;inset:0;width:100%;height:100%}
  #mini-label{position:absolute;left:50%;bottom:8px;transform:translateX(-50%);color:#cfe0f7;font:600 11px system-ui;letter-spacing:.12em;text-transform:uppercase;opacity:.85}
  #mini-tag{position:absolute;left:14px;top:10px;color:#8fb4e6;font:600 10px system-ui;letter-spacing:.16em;text-transform:uppercase}
  /* main cutaway room */
  #stage{flex:1;position:relative;min-height:0;background:radial-gradient(120% 120% at 70% 10%,#ffffff,#dfe9f6)}
  #room{position:absolute;inset:0;width:100%;height:100%}
  #room-head{position:absolute;left:20px;top:16px;z-index:3}
  #room-head .ey{font:600 11px system-ui;letter-spacing:.16em;text-transform:uppercase;color:var(--hf)}
  #room-head h1{font:600 30px Georgia,serif;color:var(--ink);line-height:1.05;margin:2px 0}
  #room-head .sub{font-size:14px;color:var(--dim)}
  /* bottom card + nav */
  #dock{flex-shrink:0;background:#fff;border-top:1px solid var(--line);padding:14px 18px 16px}
  #card{display:flex;align-items:center;gap:14px;min-height:54px}
  #card .ico{font-size:34px;flex-shrink:0}
  #card .tx{font-size:15px;line-height:1.5;color:#27364f}
  #nav{display:flex;align-items:center;gap:10px;margin-top:12px}
  .nbtn{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:#f3f8fd;color:var(--ink);font-size:18px;cursor:pointer;flex-shrink:0}
  .nbtn:hover{background:#e6eff8}
  #dots{display:flex;gap:6px;flex:1;justify-content:center;flex-wrap:wrap}
  .dot{width:9px;height:9px;border-radius:50%;background:#cfd8e8;cursor:pointer}
  .dot.on{background:var(--hf);width:22px;border-radius:4px}
  #secname{font:600 13px system-ui;color:var(--hf);min-width:120px;text-align:right}
  @media(max-width:720px){ #mini-wrap{height:150px} #room-head h1{font-size:22px} #secname{display:none} }
</style>
</head>
<body>
<header>
  <img src="assets/brand/hfh-logo.png" alt="Henry Ford Health + Michigan State University Health Sciences" />
  <div class="t"><b>Lab Tour — Room View</b><span>Pathology &amp; Laboratory Medicine</span></div>
  <a class="back" href="index.html">← Full map tour</a>
</header>
<div id="mini-wrap">
  <canvas id="mini"></canvas>
  <div id="mini-tag">You are here</div>
  <div id="mini-label"></div>
</div>
<div id="stage">
  <canvas id="room"></canvas>
  <div id="room-head"><div class="ey">Stop <span id="rh-n">1</span> of 10</div><h1 id="rh-title"></h1><div class="sub" id="rh-sub"></div></div>
</div>
<div id="dock">
  <div id="card"><div class="ico" id="card-ico">🔬</div><div class="tx" id="card-tx"></div></div>
  <div id="nav">
    <button class="nbtn" id="prev" aria-label="Previous">←</button>
    <div id="dots"></div>
    <button class="nbtn" id="next" aria-label="Next">→</button>
    <div id="secname"></div>
  </div>
</div>
<script>
// ===================== section data =====================
const SECTIONS = [
  { id:'lss', room:'accession', title:'Lab Support Services', sub:'Where every sample arrives', kit:'lss',
    cards:[{i:'🩸',t:"Ever had blood drawn at a checkup? That tube starts its journey right here."},{i:'🏷️',t:"Every sample is scanned and barcoded so it's never mixed up."},{i:'➡️',t:"Then it's routed to exactly the right lab."}]},
  { id:'lcs', room:'lab_cs', title:'Lab Customer Service', sub:'The voice of the lab', kit:'lcs',
    cards:[{i:'📞',t:"When a nurse or doctor has a question, they call this team."},{i:'🔎',t:"They track down urgent samples and help order the right test."}]},
  { id:'surgpath', room:'gross', title:'Surgical Pathology', sub:'Diagnosing disease in tissue', kit:'surgpath',
    cards:[{i:'👪',t:"A family member's colonoscopy polyp? It comes to a lab like this."},{i:'🔬',t:"Tissue is sliced razor-thin into glass slides."},{i:'🩺',t:"A pathologist reads them under the microscope — harmless, or cancer?"}]},
  { id:'cyto', room:'cytopath', title:'Cytology', sub:'Diagnosis from single cells', kit:'cyto',
    cards:[{i:'🧫',t:"A Pap smear is cytology — studying just a few loose cells."},{i:'🔬',t:"Those few cells can catch cancer super early."}]},
  { id:'microsero', room:'micro1', title:'Microbiology & Serology', sub:'Hunting germs', kit:'micro',
    cards:[{i:'🤒',t:"That strep-throat swab comes to a lab like this one."},{i:'💊',t:"They grow the germ and test which antibiotic beats it."}]},
  { id:'molec', room:'molec1', title:'Molecular Diagnostics', sub:'Reading the DNA', kit:'molec',
    cards:[{i:'🧬',t:"Remember COVID PCR? That's molecular — reading DNA and RNA."},{i:'🎯',t:"It finds the exact gene change driving a disease."}]},
  { id:'core', room:'core_lab', title:'Core Lab', sub:'Chemistry · Hematology · Coagulation · Urinalysis', kit:'core',
    cards:[{i:'🩸',t:"Your cholesterol or blood-sugar test? It runs here."},{i:'🏎️',t:"A conveyor zips thousands of tubes to machines, 24/7."}]},
  { id:'bloodbank', room:'bb', title:'Blood Bank & Transfusion', sub:'Keeping transfusions safe', kit:'bloodbank',
    cards:[{i:'🅰️',t:"Find out your blood type — and how donated blood is matched."},{i:'❤️',t:"After a bad accident, this team helps keep people alive."}]},
  { id:'quality', room:'quality', title:'Quality', sub:'Making sure every result is right', kit:'quality',
    cards:[{i:'✅',t:"They make sure every machine is accurate and every result is trustworthy."}]},
  { id:'informatics', room:'chair', title:'Pathology Informatics', sub:'The technology behind the lab', kit:'informatics',
    cards:[{i:'💻',t:"This team moves every result safely from machine to your doctor's screen."},{i:'🙌',t:"Love science AND tech? This is where they meet."}]},
];
const DEPT = {bb:0xff4628,coag:0xb845e0,lab_cs:0xea8b1e,core_lab:0x5cc6ee,sp_office:0xea8b1e,chair:0xea8b1e,cytopath:0x6b3acc,autopsy:0x4dba6c,molec:0xe84b8e,gross:0xefcc4c,quality:0xd28218,micro:0xfbcc88,hla:0xe04a8e,special:0xb840f0,histology:0xefcc4c,ihc:0xefcc4c,corridor:0x6c7388};

let idx = 0;

// ===================== MINI rotating blueprint =====================
const miniCanvas = document.getElementById('mini');
const miniRenderer = new THREE.WebGLRenderer({canvas:miniCanvas, antialias:true, alpha:true});
const miniScene = new THREE.Scene();
const miniCam = new THREE.PerspectiveCamera(40, 2, 0.1, 2000);
miniScene.add(new THREE.AmbientLight(0xffffff,0.9));
const mdl = new THREE.DirectionalLight(0xffffff,0.7); mdl.position.set(40,80,30); miniScene.add(mdl);
const miniPlan = new THREE.Group(); miniScene.add(miniPlan);
const roomMeshes = {};   // roomId -> mesh (active room highlight)
let planReady = false;

fetch('reference/rooms.json',{cache:'no-cache'}).then(r=>r.json()).then(rooms=>{
  const xs=[],zs=[]; rooms.forEach(r=>{xs.push(r.x1,r.x2);zs.push(r.z1,r.z2);});
  const cx=(Math.min(...xs)+Math.max(...xs))/2, cz=(Math.min(...zs)+Math.max(...zs))/2;
  rooms.forEach(r=>{
    if(r.nested) return;
    const w=Math.abs(r.x2-r.x1), d=Math.abs(r.z2-r.z1);
    const col=DEPT[r.dept]||DEPT.corridor;
    const mat=new THREE.MeshStandardMaterial({color:col,roughness:0.6,emissive:col,emissiveIntensity:0.08});
    const m=new THREE.Mesh(new THREE.BoxGeometry(w-0.3,0.4,d-0.3),mat);
    m.position.set((r.x1+r.x2)/2-cx,0.2,(r.z1+r.z2)/2-cz);
    m.userData={base:0.2,col};
    miniPlan.add(m); roomMeshes[r.id]=m;
  });
  const span=Math.max(Math.max(...xs)-Math.min(...xs), Math.max(...zs)-Math.min(...zs));
  miniCam.position.set(0, span*0.95, span*0.62); miniCam.lookAt(0,0,0);
  planReady=true; highlightRoom();
});

function highlightRoom(){
  if(!planReady) return;
  const activeRoom = SECTIONS[idx].room;
  for(const id in roomMeshes){
    const m=roomMeshes[id], on=(id===activeRoom);
    m.material.emissiveIntensity = on?0.9:0.06;
    m.scale.y = on?3.2:1; m.position.y = on?0.6:0.2;
    m.material.color.setHex(on?0x2f9fff:m.userData.col);
  }
}

// ===================== MAIN cutaway room =====================
const roomCanvas=document.getElementById('room');
const roomRenderer=new THREE.WebGLRenderer({canvas:roomCanvas, antialias:true});
roomRenderer.setPixelRatio(Math.min(devicePixelRatio,2));
roomRenderer.shadowMap.enabled=true; roomRenderer.outputEncoding=THREE.sRGBEncoding;
const roomScene=new THREE.Scene(); roomScene.background=new THREE.Color(0xeaf0f8);
const roomCam=new THREE.PerspectiveCamera(42,2,0.1,200);
roomScene.add(new THREE.AmbientLight(0xffffff,0.42));
const rhemi=new THREE.HemisphereLight(0xffffff,0xccd6e6,0.28); roomScene.add(rhemi);
const sun=new THREE.DirectionalLight(0xffffff,0.95); sun.position.set(5,11,6); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048); sun.shadow.camera.near=1; sun.shadow.camera.far=40;
sun.shadow.camera.left=-8; sun.shadow.camera.right=8; sun.shadow.camera.top=8; sun.shadow.camera.bottom=-8;
sun.shadow.bias=-0.0004; roomScene.add(sun);
let roomGroup=new THREE.Group(); roomScene.add(roomGroup);

const W=9, D=6.5, H=3.2;
const M={
  white:new THREE.MeshStandardMaterial({color:0xf2f4f8,roughness:0.5}),
  wall:new THREE.MeshStandardMaterial({color:0xe7edf6,roughness:0.9}),
  wallBack:new THREE.MeshStandardMaterial({color:0xcdd8e8,roughness:0.9}),
  floor:new THREE.MeshStandardMaterial({color:0xaab2c0,roughness:0.4,metalness:0.05}),
  base:new THREE.MeshStandardMaterial({color:0x8b96a8,roughness:0.6}),
  steel:new THREE.MeshStandardMaterial({color:0xb4bac4,roughness:0.3,metalness:0.8}),
  dark:new THREE.MeshStandardMaterial({color:0x252a33,roughness:0.5}),
  counter:new THREE.MeshStandardMaterial({color:0x2a3340,roughness:0.4}),
  screen:new THREE.MeshStandardMaterial({color:0x0a1830,emissive:0x2f6fed,emissiveIntensity:0.9}),
  slide:new THREE.MeshStandardMaterial({color:0x6a3a8a,emissive:0x7a3fae,emissiveIntensity:0.7}),
  glass:new THREE.MeshStandardMaterial({color:0xbfe0ff,roughness:0.08,transparent:true,opacity:0.32}),
  accent:new THREE.MeshStandardMaterial({color:0x0067a0,roughness:0.4}),
  red:new THREE.MeshStandardMaterial({color:0xc0392b,roughness:0.5}),
  tan:new THREE.MeshStandardMaterial({color:0xcdbf9a,roughness:0.7}),
  ledG:new THREE.MeshStandardMaterial({color:0x2ee06a,emissive:0x2ee06a,emissiveIntensity:1.2}),
  ledA:new THREE.MeshStandardMaterial({color:0xffb020,emissive:0xffb020,emissiveIntensity:1.2}),
};
const screens=[M.screen,M.slide];
function bx(g,x,y,z,w,h,d,m){const o=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m);o.position.set(x,y,z);o.castShadow=true;o.receiveShadow=true;g.add(o);return o;}
function cy(g,x,y,z,rt,rb,h,m,s){const o=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s||16),m);o.position.set(x,y,z);o.castShadow=true;g.add(o);return o;}

function bench(g,x,z,w,d){d=d||0.7;const t=0.92;bx(g,x,t/2,z,w,t,d,M.white);bx(g,x,t+0.03,z,w+0.06,0.06,d+0.06,M.counter);}
function microscope(g,x,z){bx(g,x,0.95,z,0.34,0.06,0.42,M.dark);bx(g,x,1.04,z+0.12,0.16,0.34,0.14,M.dark);bx(g,x,1.06,z-0.02,0.24,0.03,0.24,M.steel);cy(g,x,1.25,z-0.02,0.07,0.07,0.06,M.steel,10);const e=cy(g,x,1.36,z-0.16,0.035,0.035,0.2,M.dark,10);e.rotation.x=Math.PI/3;}
function analyzer(g,x,z,w,h,d){bx(g,x,0.12,z,w*1.04,0.24,d*1.04,M.white);bx(g,x,0.24+h/2,z,w,h,d,M.white);bx(g,x,0.24+h*0.62,z-d/2-0.01,w*0.5,h*0.32,0.02,M.screen);for(let i=0;i<3;i++)bx(g,x-w*0.3+i*0.12,0.24+h*0.86,z-d/2-0.02,0.04,0.04,0.02,[M.ledG,M.ledA,M.red][i]);}
function workstation(g,x,z,n){n=n||1;bx(g,x,0.37,z,1.6,0.74,0.7,M.white);bx(g,x,0.78,z,1.7,0.04,0.75,M.counter);for(let i=0;i<n;i++){const ox=x-(n-1)*0.45+i*0.9;bx(g,ox,1.12,z+0.1,0.62,0.36,0.03,M.dark);bx(g,ox,1.12,z+0.085,0.56,0.3,0.01,M.screen);}}
function sequencer(g,x,z){bx(g,x,0.6,z,0.9,0.8,0.6,M.white);bx(g,x,0.78,z-0.31,0.5,0.34,0.02,M.screen);for(let i=0;i<6;i++)cy(g,x-0.35+i*0.14,1.03,z,0.03,0.03,0.1,M.accent,8);}
function biosafety(g,x,z){bx(g,x,0.55,z,1.3,0.7,0.7,M.white);bx(g,x,1.4,z,1.3,1.1,0.7,M.white);bx(g,x,1.35,z-0.36,1.1,0.7,0.02,M.glass);}
function fridge(g,x,z,red){bx(g,x,1.0,z,0.9,2.0,0.7,red?M.red:M.white);bx(g,x+0.38,1.0,z-0.36,0.05,1.2,0.04,M.steel);bx(g,x,1.5,z-0.36,0.5,0.5,0.02,M.glass);}
function petriStack(g,x,z){for(let i=0;i<4;i++)cy(g,x-0.2+i*0.13,0.97+i*0.015,z,0.07,0.07,0.02,[M.red,M.ledA,M.white,M.ledG][i],16);}
function redBin(g,x,z){cy(g,x,0.26,z,0.16,0.18,0.52,M.red,16);cy(g,x,0.54,z,0.17,0.17,0.04,M.red,16);}
function serverRack(g,x,z){bx(g,x,0.9,z,0.6,1.8,0.7,M.dark);for(let i=0;i<6;i++)bx(g,x,0.35+i*0.24,z-0.36,0.5,0.05,0.02,[M.ledG,M.accent][i%2]);}
function dnaHelix(g,x,z){for(let i=0;i<14;i++){const t=i*0.5,y=0.7+i*0.12,r=0.2;cy(g,x+Math.cos(t)*r,y,z+Math.sin(t)*r,0.05,0.05,0.05,M.accent,8);cy(g,x-Math.cos(t)*r,y,z-Math.sin(t)*r,0.05,0.05,0.05,M.red,8);}}
function multihead(g,x,z,n){n=n||5;const t=0.92;bx(g,x,t/2,z,3.0,t,0.7,M.white);bx(g,x,t+0.03,z,3.06,0.06,0.76,M.counter);bx(g,x,t+0.34,z-0.05,2.7,0.08,0.08,M.steel);for(let i=0;i<n;i++){const hx=x-1.25+i*(2.5/(n-1));bx(g,hx,t+0.2,z,0.22,0.34,0.26,M.white);const e1=cy(g,hx-0.05,t+0.5,z-0.22,0.03,0.03,0.18,M.dark,10);e1.rotation.x=Math.PI/3;const e2=cy(g,hx+0.05,t+0.5,z-0.22,0.03,0.03,0.18,M.dark,10);e2.rotation.x=Math.PI/3;cy(g,hx,0.55,z-0.45,0.16,0.18,0.55,M.dark,12);}bx(g,x+1.9,t+0.42,z+0.2,0.74,0.46,0.04,M.dark);bx(g,x+1.9,t+0.42,z+0.18,0.66,0.38,0.01,M.slide);}
function grossStation(g,x,z){bx(g,x,0.46,z,1.3,0.92,0.8,M.steel);bx(g,x,0.95,z,1.36,0.06,0.86,M.steel);bx(g,x,1.55,z+0.42,1.4,1.2,0.06,M.steel);cy(g,x-0.45,1.85,z,0.05,0.05,1.8,M.steel,10);bx(g,x-0.1,2.7,z,0.8,0.1,0.5,M.steel);bx(g,x,0.99,z-0.12,0.6,0.05,0.42,M.tan);redBin(g,x+0.85,z+0.2);redBin(g,x-0.85,z+0.25);}

function buildKit(g,kit){
  const zb=-D/2+1.2; // back zone
  if(kit==='lss'){bench(g,0,zb,3.4);workstation(g,-2.2,zb+0.2,1);redBin(g,2.6,zb+0.2);analyzer(g,2.2,zb,0.5,0.4,0.4);}
  else if(kit==='lcs'){workstation(g,0,zb,2);bench(g,2.8,zb,1.6);}
  else if(kit==='surgpath'){grossStation(g,-2.4,zb+0.3);multihead(g,1.3,zb,5);}
  else if(kit==='cyto'){bench(g,-1.2,zb,3.0);microscope(g,-1.4,zb-0.2);petriStack(g,0.6,zb+0.2);workstation(g,2.6,zb,1);}
  else if(kit==='micro'){biosafety(g,-2.4,zb+0.3);fridge(g,-0.6,zb+0.3);petriStack(g,1.0,zb);analyzer(g,2.4,zb,0.8,0.6,0.5);redBin(g,0.2,zb-0.5);}
  else if(kit==='molec'){sequencer(g,-2.4,zb+0.3);analyzer(g,-0.6,zb,0.8,0.6,0.5);dnaHelix(g,1.6,zb);workstation(g,3.0,zb,1);}
  else if(kit==='core'){for(let i=-2;i<=2;i++)analyzer(g,i*1.5,zb+0.3,1.1,0.8,0.7);bx(g,0,1.3,zb+0.3,7.6,0.1,0.3,M.steel);}
  else if(kit==='bloodbank'){fridge(g,-2.4,zb+0.3,true);fridge(g,-1.2,zb+0.3,true);bench(g,1.3,zb,3.0);workstation(g,2.6,zb,1);}
  else if(kit==='quality'){workstation(g,-1.2,zb,2);bx(g,2.4,1.4,zb+0.1,0.06,1.1,1.0,M.white);bench(g,2.4,zb+0.6,1.4);}
  else if(kit==='informatics'){workstation(g,-1.0,zb,2);serverRack(g,2.6,zb+0.3);serverRack(g,3.4,zb+0.3);}
}

function buildRoom(){
  roomScene.remove(roomGroup); roomGroup.traverse(o=>{if(o.geometry)o.geometry.dispose();}); roomGroup=new THREE.Group();
  // floor + 3 walls (front open, no ceiling)
  bx(roomGroup,0,-0.05,0,W,0.1,D,M.floor);
  bx(roomGroup,0,H/2,-D/2,W,H,0.12,M.wallBack);      // back wall (darker, reads clearly)
  bx(roomGroup,-W/2,H/2,0,0.12,H,D,M.wall);          // left wall
  bx(roomGroup,W/2,H/2,0,0.12,H,D,M.wall);           // right wall
  bx(roomGroup,0,H-0.06,-D*0.05,W,0.12,D*0.5,M.wall);// partial ceiling at back for depth
  // baseboards (define where walls meet floor)
  bx(roomGroup,0,0.09,-D/2+0.08,W,0.18,0.05,M.base);
  bx(roomGroup,-W/2+0.08,0.09,0,0.05,0.18,D,M.base);
  bx(roomGroup,W/2-0.08,0.09,0,0.05,0.18,D,M.base);
  // window strip on back wall
  bx(roomGroup,0,1.8,-D/2+0.07,W*0.72,1.1,0.02,M.glass);
  buildKit(roomGroup, SECTIONS[idx].kit);
  roomScene.add(roomGroup);
}

// ===================== render loop =====================
const clock=new THREE.Clock();
function resize(){
  const mw=miniCanvas.clientWidth,mh=miniCanvas.clientHeight;
  if(miniCanvas.width!==mw||miniCanvas.height!==mh){miniRenderer.setSize(mw,mh,false);miniCam.aspect=mw/mh;miniCam.updateProjectionMatrix();}
  const rw=roomCanvas.clientWidth,rh=roomCanvas.clientHeight;
  if(roomCanvas.width!==rw||roomCanvas.height!==rh){roomRenderer.setSize(rw,rh,false);roomCam.aspect=rw/rh;roomCam.updateProjectionMatrix();}
}
let roomT=0;
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05); resize();
  miniPlan.rotation.y += dt*0.35;                    // blueprint spins
  // gentle room orbit for life — lower & closer so it reads as looking INTO the room
  roomT += dt*0.08;
  roomCam.position.set(Math.sin(roomT)*1.4, 3.7, 4.4);
  roomCam.lookAt(0,0.95,-1.5);
  const g=0.6+(Math.sin(clock.elapsedTime*1.6)*0.5+0.5)*0.5;
  M.screen.emissiveIntensity=g; M.slide.emissiveIntensity=0.45+g*0.4;
  miniRenderer.render(miniScene,miniCam);
  roomRenderer.render(roomScene,roomCam);
}

// ===================== UI =====================
function renderDots(){const d=document.getElementById('dots');d.innerHTML='';SECTIONS.forEach((s,i)=>{const b=document.createElement('button');b.className='dot'+(i===idx?' on':'');b.title=s.title;b.onclick=()=>go(i);d.appendChild(b);});}
let cardI=0;
function show(){
  const s=SECTIONS[idx];
  document.getElementById('rh-n').textContent=idx+1;
  document.getElementById('rh-title').textContent=s.title;
  document.getElementById('rh-sub').textContent=s.sub;
  document.getElementById('secname').textContent=s.title;
  document.getElementById('mini-label').textContent=s.title;
  cardI=0; showCard();
  renderDots(); highlightRoom(); buildRoom();
}
function showCard(){const s=SECTIONS[idx];const c=s.cards[cardI%s.cards.length];document.getElementById('card-ico').textContent=c.i;document.getElementById('card-tx').textContent=c.t;}
function go(i){idx=(i+SECTIONS.length)%SECTIONS.length;show();}
document.getElementById('next').onclick=()=>{const s=SECTIONS[idx];if(cardI<s.cards.length-1){cardI++;showCard();}else go(idx+1);};
document.getElementById('prev').onclick=()=>{if(cardI>0){cardI--;showCard();}else go(idx-1);};
document.getElementById('card').onclick=()=>{const s=SECTIONS[idx];if(cardI<s.cards.length-1){cardI++;showCard();}};

show(); animate();
</script>
